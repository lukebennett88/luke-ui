allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true

packages:
  - apps/*
  - packages/*
  - packages/@luke-ui/*

catalogMode: prefer

peerDependencyRules:
  allowedVersions:
    '@joshwooding/vite-plugin-react-docgen-typescript>vite': ^8.0.0
    '@tailwindcss/vite>vite': ^8.0.0
    vite: '*'
    vitest: '*'

  allowAny:
    - vite
    - vitest

minimumReleaseAge: 7200 # 5 days, in minutes

minimumReleaseAgeExclude:
  - '@babel/core@7.29.1'
  - '@tanstack/start-server-core@1.167.30'
  - brace-expansion@1.1.13 || 5.0.5 || 5.0.6
  - esbuild@0.28.1
  - fast-uri@3.1.1 || 3.1.2
  - h3@2.0.1-rc.15 || 2.0.1-rc.18 || 2.0.1
  - js-yaml@3.15.0 || 4.1.2
  - path-to-regexp@8.4.0
  - picomatch@2.3.2
  - srvx@0.11.13
  - vite@7.3.2 || 7.3.5 || 8.0.16
  - ws@8.20.1 || 8.21.0

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

trustLockfile: true

trustPolicy: no-downgrade

