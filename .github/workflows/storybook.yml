name: Storybook

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  visual-tests:
    name: visual-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tooling with mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm --filter @luke-ui/react exec playwright install --with-deps chromium

      - name: Run Storybook visual tests
        run: corepack pnpm run test:visual
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

  deploy-pages:
    name: deploy-pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: visual-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup tooling with mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Storybook
        run: corepack pnpm run build:storybook
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: packages/@luke-ui/react/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
