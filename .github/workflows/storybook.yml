name: Storybook

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  component-tests:
    name: component-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tooling with mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm --filter @luke-ui/react exec playwright install --with-deps chromium

      - name: Build package
        run: corepack pnpm build:packages

      - name: Run component tests
        run:
          corepack pnpm --filter @luke-ui/react run test:unit && corepack pnpm --filter
          @luke-ui/react run test:browser && corepack pnpm --filter @luke-ui/react run
          test:storybook
