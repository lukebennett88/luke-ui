name: Storybook

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  visual-tests:
    name: visual-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup tooling with mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm --filter @luke-ui/react exec playwright install --with-deps chromium

      - name: Build package
        run: corepack pnpm build:packages

      - name: Run Storybook visual tests
        run: corepack pnpm test
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

  deploy-pages:
    name: deploy-pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: visual-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup tooling with mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build package
        run: corepack pnpm build:packages

      - name: Build Storybook
        run: corepack pnpm build:storybook
        env:
          STORYBOOK_BASE_PATH: ${{ steps.pages.outputs.base_path }}/storybook

      - name: Build docs
        run: corepack pnpm build:docs
        env:
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}/

      - name: Assemble Pages artifact
        run: |
          BASE_PATH="${{ steps.pages.outputs.base_path }}"
          # Strip the leading slash to get the subdirectory name (e.g. /luke-ui → luke-ui).
          # The docs prerendering outputs HTML under .output/public/<subdir>/ when basePath
          # is set, so we copy from there and let GitHub Pages handle the /luke-ui/ prefix.
          STRIPPED="${BASE_PATH#/}"
          mkdir -p dist
          if [ -n "$STRIPPED" ] && [ -d "apps/docs/.output/public/${STRIPPED}" ]; then
            cp -r "apps/docs/.output/public/${STRIPPED}/." dist/
          else
            # Fallback for root deployments (user/org Pages or custom domain)
            cp -r apps/docs/.output/public/. dist/
          fi
          # Assets are output at .output/public/assets/ regardless of basePath
          [ -d apps/docs/.output/public/assets ] && cp -r apps/docs/.output/public/assets dist/
          [ -d apps/docs/.output/public/__tsr ]  && cp -r apps/docs/.output/public/__tsr dist/
          [ -d apps/docs/.output/public/api ]    && cp -r apps/docs/.output/public/api dist/
          # Storybook lives at /storybook/ within the Pages site
          cp -r packages/@luke-ui/react/storybook-static dist/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
