name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install
      - run: pnpm build:docs
      - run: pnpm build:storybook
        env:
          STORYBOOK_BASE_PATH: /storybook
      - name: Prepare static deploy
        run: |
          mkdir -p /tmp/deploy
          cp -r apps/docs/.output/public/* /tmp/deploy/
          cp -r packages/@luke-ui/react/storybook-static /tmp/deploy/storybook
          cp apps/docs/void.json /tmp/deploy/
          cp -r apps/docs/.void /tmp/deploy/
      - run: pnpm exec void deploy --dir /tmp/deploy --spa --skip-build
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
