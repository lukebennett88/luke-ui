name: Freeze visual goldens

# Captures the committed visual golden set on the canonical CI platform
# (ubuntu-latest), matching where `Visual regression` runs its comparison.
# Goldens are platform-specific, so they must be frozen here rather than on a
# contributor's machine. The result is uploaded as the `visual-goldens`
# artifact to download and commit. See docs/VISUAL_TESTING.md.
on:
  workflow_dispatch:
  push:
    branches:
      - chore/freeze-ve-goldens

concurrency:
  group: visual-goldens-freeze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  freeze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm --filter @luke-ui/react exec playwright install --with-deps chromium
      - name: Capture frozen goldens
        run: corepack pnpm --filter @luke-ui/react test:visual:freeze
      - uses: actions/upload-artifact@v4
        with:
          name: visual-goldens
          path: packages/@luke-ui/react/visual-goldens
          retention-days: 14
